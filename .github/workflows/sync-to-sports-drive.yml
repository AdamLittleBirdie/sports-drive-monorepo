name: Sync to Sports Drive

on:
  push:
    branches:
      - main

jobs:
  dispatch:
    name: Trigger Figma token sync in sports-drive-monorepo
    runs-on: ubuntu-latest

    steps:
      - name: Send repository_dispatch to sports-drive-monorepo
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.SPORTS_DRIVE_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/AdamLittleBirdie/sports-drive-monorepo/dispatches \
            -d "{\"event_type\":\"figma-token-update\",\"client_payload\":{\"sha\":\"${{ github.sha }}\"}}"
