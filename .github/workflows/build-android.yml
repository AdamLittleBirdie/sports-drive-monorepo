name: Build Android App

on:
  push:
    tags:
      - 'v*'

jobs:
  generate-keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore release.jks \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias scoredrive-key \
            -storepass "MySecurePass123!" \
            -keypass "MySecurePass123!" \
            -dname "CN=Adam LittleBirdie,O=ScoreDrive,L=Australia,C=AU"
      
      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: keystore
          path: release.jks 

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download keystore artifact
        uses: actions/download-artifact@v4
        with:
            name: keystore
            path: apps/mobile/android

      - name: Extract version from tag
        id: version
        run: |
          TAG=${{ github.ref }}
          VERSION=${TAG#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download Gradle wrapper JAR
        working-directory: apps/mobile/android
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.3.0/gradle/wrapper/gradle-wrapper.jar

      
      - name: Create key.properties
        working-directory: apps/mobile/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          cat > key.properties <<EOF
          storeFile=../release.jks
          storePassword=MySecurePass123!
          keyAlias=scoredrive-key
          keyPassword=MySecurePass123!
          EOF
          echo "key.properties created"

      - name: Get Flutter dependencies
        working-directory: apps/mobile
        run: flutter pub get
      
      - name: Update pubspec.yaml with version
        working-directory: apps/mobile
        run: |
          VERSION=${{ steps.version.outputs.version }}
          BUILD_NUMBER=$(echo $VERSION | tr '.' '\n' | tail -1)
          sed -i "s/version: .*/version: $VERSION+$BUILD_NUMBER/" pubspec.yaml
          echo "Updated pubspec.yaml to version: $VERSION+$BUILD_NUMBER"
          cat pubspec.yaml | grep version
      
      - name: Build signed release App Bundle
        working-directory: apps/mobile
        run: flutter build appbundle --release

      - name: Upload App Bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: apps/mobile/build/app/outputs/bundle/release/app-release.aab

      - name: Upload to Google Play internal testing track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.sportsdrive.app
          releaseFiles: apps/mobile/build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: apps/mobile/build/app/outputs/bundle/release/app-release.aab
          tag_name: ${{ github.ref }}
          body: |
            ## Sports Drive Mobile App v${{ steps.version.outputs.version }}
            
            This release has been automatically uploaded to the **Google Play internal testing track**.
            Testers will receive the update automatically via the Google Play app.
            
            A signed App Bundle (.aab) is also attached below for reference.
            
            **Manual Installation (fallback):**
            1. Download the APK from the assets below
            2. Enable "Unknown Sources" on your Android device
            3. Install the APK
            
            **Testing:**
            - Connect to backend: https://sports-drive-backend-production.up.railway.app
            - Test all match feeds and scores
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
